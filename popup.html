<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Copy</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        min-width: 240px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        font-size: 13px;
      }

      .hint {
        margin-top: 10px;
        padding: 8px 10px;
        background: #e2e8f0;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Quick Copy</h1>
    <p>Select text on any page, right-click, then choose <strong>Quick Copy</strong>.</p>
    <p class="hint">The selected text is copied instantly and a small toast confirms it.</p>
  </body>
</html>
